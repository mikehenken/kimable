name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install pyyaml
        run: pip install pyyaml

      - name: validate agent.yaml files
        run: |
          python3 << 'PYEOF'
          import yaml, sys, os

          failed = False
          for root, dirs, files in os.walk('.'):
              # skip .github
              if root.startswith('./.github'):
                  continue
              for f in files:
                  if f != 'agent.yaml':
                      continue
                  path = os.path.join(root, f)
                  try:
                      with open(path) as fh:
                          data = yaml.safe_load(fh)
                  except Exception as e:
                      print(f'FAIL: {path} - yaml parse error: {e}')
                      failed = True
                      continue

                  required = ['version', 'name', 'description', 'tools']
                  missing = [k for k in required if k not in data]
                  if missing:
                      print(f'FAIL: {path} - missing keys: {missing}')
                      failed = True
                  else:
                      print(f'OK:  {path} -> {data["name"]}')

          if failed:
              sys.exit(1)
          print('all agent.yaml files valid')
          PYEOF

      - name: validate kimable.yaml
        run: |
          python3 << 'PYEOF'
          import yaml, sys

          with open('kimable.yaml') as fh:
              data = yaml.safe_load(fh)

          subagents = data.get('subagents', [])
          if len(subagents) != 14:
              print(f'expected 14 subagents, got {len(subagents)}')
              sys.exit(1)
          print(f'found {len(subagents)} subagents')
          PYEOF

      - name: check subagent file structure
        run: |
          python3 << 'PYEOF'
          import os, sys

          failed = False
          for name in sorted(os.listdir('subagents')):
              d = os.path.join('subagents', name)
              if not os.path.isdir(d):
                  continue
              if not os.path.isfile(os.path.join(d, 'agent.yaml')):
                  print(f'missing: {d}/agent.yaml')
                  failed = True
              if not os.path.isfile(os.path.join(d, 'system.md')):
                  print(f'missing: {d}/system.md')
                  failed = True

          if failed:
              sys.exit(1)
          print('all subagent dirs have their files')
          PYEOF

      - name: basic lint
        run: |
          for f in claude-integration/*.sh; do
            [[ -f "$f" ]] || continue
            bash -n "$f" || exit 1
            echo "OK: $f"
          done
          echo "lint passed"
